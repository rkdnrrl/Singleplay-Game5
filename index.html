<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>왕국의 대장간</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <main class="stage forge-stage">
      <div class="forge-split">
        <section class="furnace-panel" aria-label="용광로">
          <h2 class="furnace-title">용광로</h2>
          <p class="furnace-hint">보관함에서 <strong>「용광로」</strong>를 고른 뒤 재료를 담고 녹이면 괴·유리 등이 나옵니다.</p>
          <div id="furnaceSlots" class="furnace-chips"></div>
          <div class="furnace-visual" aria-hidden="true">
            <div class="furnace-glow"></div>
            <div class="furnace-stack">
              <div class="furnace-mouth"></div>
              <div class="furnace-body"></div>
              <div class="furnace-base"></div>
            </div>
          </div>
          <button type="button" class="cast-btn furnace-btn" id="btnSmelt" disabled>🔥 녹이기</button>
          <button type="button" class="forge-secondary-btn" id="btnClearFurnace">용광로 비우기</button>
          <p class="furnace-msg" id="furnaceMsg"></p>
          <div class="smelt-stock-wrap">
            <p class="smelt-stock-title">녹인 산출물</p>
            <div id="smeltStockList" class="smelt-stock-list"></div>
          </div>
        </section>

        <section class="refine-panel forge-workbench" aria-label="모루·제련">
          <p class="forge-slots-label">모루 위 재료 (2개 이상 조합 · 서버 저장 · 칩을 누르면 빼기)</p>
          <div class="anvil-block" aria-label="모루">
            <div class="anvil-chips-panel">
              <div id="selectedSlots" class="anvil-chips forge-slots--list"></div>
            </div>
            <div class="anvil-riser" aria-hidden="true"></div>
            <div class="anvil-illustration" aria-hidden="true">
              <div class="anvil-horn"></div>
              <div class="anvil-table">
                <div class="anvil-table-shine"></div>
              </div>
              <div class="anvil-neck"></div>
              <div class="anvil-foot"></div>
            </div>
          </div>

          <button type="button" class="cast-btn forge-btn" id="btnForge" disabled>⚒️ 제련하기</button>
          <button type="button" class="forge-secondary-btn" id="btnClear">선택 비우기</button>

          <p class="status-msg" id="statusMsg">보관함에서 모루/용광로를 고른 뒤 재료를 눌러 담으세요.</p>
        </section>
      </div>
    </main>

    <section class="log-panel forge-extra" aria-label="제작한 장비">
      <h2 class="log-title">🛡️ 제작한 장비</h2>
      <div id="craftedList" class="crafted-list"></div>
    </section>
  </div>

  <section class="log-panel inventory-dock" id="materialDock" aria-label="재료 보관함">
    <div class="inv-header">
      <h2 class="log-title">📦 재료 <span id="matCountBadge" class="mat-badge">0</span></h2>
    </div>
    <div class="inv-target" role="radiogroup" aria-label="재료를 담을 위치">
      <label class="inv-target-label">
        <input type="radio" name="forgeTarget" value="anvil" checked />
        <span>모루·제련</span>
      </label>
      <label class="inv-target-label">
        <input type="radio" name="forgeTarget" value="furnace" />
        <span>용광로</span>
      </label>
    </div>
    <div class="inv-scroll-wrap" id="materialScrollWrap">
      <div class="log-list" id="materialList">
        <p class="log-empty">재료가 없습니다. 낚시로 재료를 모은 뒤 새로고침 하세요.</p>
      </div>
    </div>
  </section>

  <div id="forgeOverlay" class="forge-overlay forge-overlay--hidden" role="status" aria-live="polite" aria-atomic="true" aria-hidden="true">
    <div class="forge-overlay-card">
      <div class="forge-overlay-anvil" aria-hidden="true">
        <span class="forge-hammer">🔨</span>
        <span class="forge-spark">✨</span>
      </div>
      <p class="forge-overlay-title">제련 중…</p>
      <p class="forge-overlay-timer" id="forgeOverlayTimer">예상 시간 약 20초</p>
      <div class="forge-progress-dots" aria-hidden="true"><span></span><span></span><span></span></div>
    </div>
  </div>

  <div class="result-card hidden" id="resultCard">
    <div class="result-preview">
      <div class="result-sprite-host" id="resultSpriteHost" aria-hidden="true"></div>
    </div>
    <div class="result-body">
      <span class="result-rarity" id="resultRarity">장비</span>
      <span class="result-name" id="resultName"></span>
      <span class="result-size" id="resultDesc"></span>
      <span class="result-added">서버에 저장됨</span>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="game.js"></script>
</body>
</html>
